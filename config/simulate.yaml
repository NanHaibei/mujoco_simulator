      #   step_interval: 8

      # 地形可视化
      # - path: "terrain:Terrain"
      #   step_interval: 8

      # 里程计（rviz/foxglove可视化，建议开启）
      # - path: "odom:Odom"
      #   step_interval: 5
      #   odomTopic: "/robot_odom"

      # IMU数据发布（用于感知）
      # - path: "imu:Imu"
      #   step_interval: 50
      #   imuTopic: "/imu"
      #   g_unit: "g"

      # 激光雷达
