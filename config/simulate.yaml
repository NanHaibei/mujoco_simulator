mujoco_simulator:
    # 渲染频率
    renderRate: 60.0  # Hz，MuJoCo可视化窗口渲染频率

    # 是否输出模型信息表格
    modelTableFlag: false # true是会, false是不会

    # 仿真控制参数
    unPauseService: "/unpause_mujoco"  # 启动服务名称
    initPauseFlag: false  # true是会暂停, false是不会暂停

    # 插件配置
    # 配置顺序决定执行优先级（越靠前优先级越高）
    # path格式: "module:class"，例如 "low_command:LowCommand"
    # step_interval: 每隔多少仿真步执行一次（仿真频率通常为500Hz）
    plugins:
      # 命令 - 负责初始化 low_cmd_msg，接收控制命令并计算关节力矩
      - path: "low_command:LowCommand"
        step_interval: 1 # 由回调函数决定，设置多少都行
        jointCommandsTopic: "/low_command"
        cmdDelay: 0

      # 低状态发布（电机与IMU状态）- 初始化 low_state_msg
      - path: "low_state:LowState"
        step_interval: 5 
        lowStateTopic: "/low_state"
        stateDelay: 0
        noise_imu_angle_acc: 0.0
        noise_imu_gravity: 0.0
        noise_joint_pos: 0.0
        noise_joint_vel: 0.0

      # 高程图
      # - path: "elevation_map:ElevationMap"
      #   step_interval: 8
      #   topic: "/elevation/map_array"
      #   attach_link_name: "lidar_site"
      #   size: [1.35, 0.95]
      #   resolution: 0.05
      #   noise_elevation_map: 0.0

      # 关节状态发布（用于可视化）
      # - path: "joint_state:JointStates"
      #   step_interval: 8

      # 地形可视化
      # - path: "terrain:Terrain"
      #   step_interval: 8

      # 里程计
      # - path: "odom:Odom"
      #   step_interval: 5
      #   odomTopic: "/robot_odom"

      # IMU数据发布（用于感知）
      # - path: "imu:Imu"
      #   step_interval: 50
      #   imuTopic: "/imu"
      #   g_unit: "g"

      # 激光雷达
      # - path: "lidar:Lidar"
      #   step_interval: 50
      #   pointCloudTopic: "/point_cloud"
      #   pointCloudType: "PointCloud2"

      # 水平雷达（障碍物感知）
      - path: "horizontal_radar:HorizontalRadar"
        step_interval: 10
        site_name: "lidar_site"
        num_rays: 64
        num_bins: 16
        max_distance: 3.0
        topic_name: "/horizontal_radar"
        enable_visualization: true

      # Map坐标系
      # - path: "map_frame:MapFrame"
      #   step_interval: 1
